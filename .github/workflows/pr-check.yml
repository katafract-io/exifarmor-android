name: PR check (compile gate)

on:
  pull_request:

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Android compile (compile gate)
    runs-on: [self-hosted, Linux, X64, android-build]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle config parse (fast compile gate)
        run: |
          chmod +x gradlew
          ./gradlew help --no-daemon
